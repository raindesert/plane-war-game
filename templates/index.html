<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞机大战</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>飞机大战</h1>
            <div class="score-board">
                <span>分数: <span id="score">0</span></span>
                <span>等级: <span id="level">1</span></span>
                <span>生命: <span id="lives">3</span></span>
                <span id="laserStatus" style="display: none; color: #00ffff; font-weight: bold;">⚔️ 激光升级</span>
            </div>
        </div>

        <div class="game-wrapper">
            <canvas id="gameCanvas" width="800" height="600"></canvas>

            <!-- 游戏开始界面 -->
            <div id="startScreen" class="overlay">
                <div class="overlay-content">
                    <h2>飞机大战</h2>
                    <p class="instructions">
                        WASD或方向键移动<br>
                        空格键射击
                    </p>
                    <button id="startBtn" class="btn">开始游戏</button>
                </div>
            </div>

            <!-- 游戏结束界面 -->
            <div id="gameOverScreen" class="overlay hidden">
                <div class="overlay-content">
                    <h2>游戏结束</h2>
                    <p>最终分数: <span id="finalScore">0</span></p>
                    <p>达到等级: <span id="finalLevel">1</span></p>
                    <button id="restartBtn" class="btn">重新开始</button>
                </div>
            </div>
        </div>

        <div class="game-footer">
            <p>按R键重新开始 | 按ESC暂停</p>
        </div>
    </div>

    <script src="/static/js/game.js"></script>
</body>
</html>
